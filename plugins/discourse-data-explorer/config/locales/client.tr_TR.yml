      help:
        label: "Yardım"
        modal_title: "Veri Gezgini Yardımı"
        auto_resolution: "<h2>Otomatik varlık çözümleme</h2> <p>Sorgunuz bir varlık kimliği döndürdüğünde, Data Explorer bunu sorgu sonuçlarında otomatik olarak varlık adı ve diğer yararlı bilgilerle değiştirebilir. Otomatik çözümleme, <i><b>user_id</b></i>, <i><b>group_id</b></i>, <i><b>topic_id</b></i>, <i><b>category_id</b></i> ve <i><b>badge_id</b></i> için kullanılabilir. Bunu denemek için şu sorguyu çalıştırın:</p> <pre><code>SELECT user_id FROM posts</code></pre>"
        custom_params: "<h2>Özel parametreler oluşturma</h2> <p>Sorgularınız için özel parametreler oluşturmak için bunu sorgunuzun en üstüne yerleştirin ve şu biçimi izleyin:</p> <pre><code>-- [params]\n-- int :num = 1\n\nSELECT :num</code></pre> <p><i>Not: [params] ile başlayan ilk satır, önündeki iki tire ve beyan etmek istediğiniz her özel parametre ile birlikte gereklidir..</i></p>"
        default_values: "<h3>Varsayılan değerler</h3> <p>Parametreleri varsayılan değerlerle veya varsayılan değerler olmadan tanımlayabilirsiniz. Varsayılan değerler, sorgu düzenleyicinin altındaki bir metin alanında gösterilir ve bu alanı ihtiyaçlarınıza göre düzenleyebilirsiniz. Varsayılan değerler olmadan tanımlanan parametreler de bir metin alanı oluşturur, ancak bu alan boş olur ve kırmızı renkle vurgulanır. </p> <pre><code>-- [params]\n-- text :username = my_username\n-- int :age</code></pre>"
        data_types: "<h3>Veri türleri</h3> <p>Kullanabileceğiniz yaygın veri türleri şunlardır:</p> <ul> <li><b>tamsayı</b> - işaretli dört baytlık tamsayı</li> <li><b>metin</b> - değişken uzunlukta karakter dizisi</li> <li><b>boolean</b> – doğru/yanlış</li> <li><b>tarih</b> - takvim tarihi (yıl, ay, gün)</li> <li><b>current_user_id</b> - Sorguyu çalıştıran kullanıcının kimliği (otomatik olarak eklenir, grup raporları için kullanışlıdır)</li> </ul> <p>Veri türleri hakkında daha fazla bilgi için <a href='http://www.postgresql.org/docs/9.3/static/datatype.html#DATATYPE-TABLE' target='_blank'>bu web sitesini</a> ziyaret edin."
