es:
  site_settings:
    data_explorer_enabled: "Activar el explorador de datos"
    data_explorer_ai_queries_enabled: "Activar la generación de consultas de IA en el explorador de datos"
  discourse_ai:
    ai_bot:
      agents:
        ai_query_generator:
          name: "Generador de consultas del explorador de datos"
          description: "Genera consultas SQL para el explorador de datos a partir de lenguaje natural"
      tool_help:
        run_sql: "Ejecuta una consulta SQL y devuelve resultados"
      tool_summary:
        run_sql: "Ejecutando consulta SQL"
      tool_description:
        run_sql: "Consulta SQL ejecutada"
  discourse_data_explorer:
    ai:
      error_agent_not_configured: "El agente de IA no está configurado. Revisa los ajustes de las funciones de IA."
      error_no_sql_returned: "La IA no devolvió una consulta SQL válida. Inténtalo de nuevo o escribe la consulta manualmente."
  discourse_automation:
    scriptables:
      recurring_data_explorer_result_pm:
        title: Programar un MP con los resultados del explorador de datos
        description: Recibir informes programados enviados a tus mensajes
        no_csv_allowed: "Cuando utilices el campo `attach_csv`, debe añadirse `csv` a la lista de extensiones autorizadas en los ajustes del sitio."
      recurring_data_explorer_result_topic:
        title: Programar una publicación en un tema con los resultados del Explorador de datos
        description: Obtener informes programados publicados en un tema específico
  data_explorer:
    report_generator:
      private_message:
        title: "Informe programado para %{query_name}"
        body: |
          Hola, %{recipient_name}: tu informe del explorador de datos ya está disponible.

          Nombre de la consulta:
          %{query_name}

          Aquí tienes los resultados:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Ver consulta en el explorador de datos</a>

          Informe creado a las %{created_at} (%{timezone})
      post:
        body: |
          ### Informe programado para %{query_name}

          Aquí tienes los resultados:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Ver consulta en el explorador de datos</a>

          Informe creado a las %{created_at} (%{timezone})
      upload_appendix: "Apéndice: [%{filename}|archivo adjunto](%{short_url})"
