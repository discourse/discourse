      help:
        label: "Súgó"
        modal_title: "Adatfelfedező súgó"
        auto_resolution: "<h2>Automatikus entitásfeloldás</h2> <p>Amikor a lekérdezés entitásazonosítót ad vissza, az Adatkezelő automatikusan helyettesítheti azt az entitás nevével és más hasznos információkkal a lekérdezés eredményeiben. Automatikus felbontás érhető el a következő elemekhez: <i><b>user_id</b></i>, <i><b>group_id</b></i>, <i><b>topic_id</b></i>, <i><b>category_id</b></i> és <i><b>badge_id</b></i>. Kipróbáláshoz futtasd a következő lekérdezést:</p> <pre><code>SELECT user_id\nFROM posts</code></pre>"
        custom_params: "<h2>Egyéni paraméterek létrehozása</h2> <p>Egyéni paraméterek létrehozásához a lekérdezéseidhez írd ezt a lekérdezés elejére, és kövesd a következő formátumot:</p> <pre><code>-- [params]\n-- int :num = 1\n\nSELECT :num</code></pre> <p><i>Megjegyzés: az első sornak a [params] karakterlánccal kell rendelkeznie, a két előtte lévő kötőjellel együtt, valamint minden deklarálni kívánt egyéni paraméternek.</i></p>"
        default_values: "<h3>Alapértelmezett értékek</h3> <p>Deklarálhatsz paramétereket alapértelmezett értékekkel vagy anélkül. Az alapértelmezett értékek egy szövegmezőben jelennek meg a lekérdezésszerkesztő alatt, amelyet igényeid szerint szerkeszthetsz. Az alapértelmezett érték nélkül deklarált paraméterek továbbra is létrehoznak egy szövegmezőt, de üresek és pirossal lesznek kiemelve.</p> <pre><code>-- [params]\n-- text :username = my_username\n-- int :age</code></pre>"
        data_types: "<h3>Adattípusok</h3> <p>Íme néhány gyakori adattípus, amit használhatsz:</p> <ul> <li><b>egész szám</b> - előjeles négybájtos egész szám</li> <li><b>szöveg</b> - változó hosszúságú karakterlánc</li> <li><b>logikai érték</b> – igaz/hamis</li> <li><b>date</b> - naptári dátum (év, hónap, nap)</li> <li><b>current_user_id</b> - a lekérdezést futtató felhasználó azonosítója (automatikusan befecskendezve, hasznos csoportos jelentésekhez)</li> </ul> <p>Az adattípusokkal kapcsolatos további információkért látogassa meg <a href='http://www.postgresql.org/docs/9.3/static/datatype.html#DATATYPE-TABLE' target='_blank'>ezt a weboldalt</a>.</p>"
