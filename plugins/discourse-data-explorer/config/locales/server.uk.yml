uk:
  site_settings:
    data_explorer_enabled: "Увімкнути оглядач даних"
    data_explorer_ai_queries_enabled: "Увімкнути генерацію запитів ШІ в Data Explorer"
  discourse_ai:
    ai_bot:
      agents:
        ai_query_generator:
          name: "Генератор запитів Data Explorer"
          description: "Генерує SQL-запити для Data Explorer з природної мови"
      tool_help:
        run_sql: "Запускає SQL-запит і повертає результати"
      tool_summary:
        run_sql: "Виконання SQL-запиту"
      tool_description:
        run_sql: "Виконав SQL-запит"
  discourse_data_explorer:
    ai:
      error_agent_not_configured: "ШІ-агент не налаштований. Будь ласка, перевірте налаштування функцій ШІ."
      error_no_sql_returned: "ШІ не повернув правильний SQL-запит. Будь ласка, спробуйте ще раз або напишіть запит вручну."
  discourse_automation:
    scriptables:
      recurring_data_explorer_result_pm:
        title: Заплануйте ПП з результатами Провідника даних
        description: Отримуйте заплановані звіти на свої повідомлення
        no_csv_allowed: "Під час використання поля `attach_csv`, `csv` необхідно додати до списку авторизованих розширень у налаштуваннях сайту."
      recurring_data_explorer_result_topic:
        title: Запланувати публікацію в темі за допомогою результатів Data Explorer
        description: Отримуйте заплановані звіти, опубліковані на певну тему
  data_explorer:
    report_generator:
      private_message:
        title: "Запланований звіт для %{query_name}"
        body: |
          Привіт %{recipient_name}, ваш звіт Data Explorer готовий.

          Ім’я запиту:
          %{query_name}

          Ось результати:
          %{table}

          <a href='%{base_url}/admin/plugins/explorer/queries/%{query_id}'>Перегляд запиту в Data Explorer</a>

          Звіт створено о %{created_at} (%{timezone})
      post:
        body: |
          ### Запланований звіт для %{query_name}

          Ось результати:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Перегляд запиту в Data Explorer</a>

          Звіт створено за адресою %{created_at} (%{timezone})
      upload_appendix: "Додаток: [%{filename}|вкладення](%{short_url})"
