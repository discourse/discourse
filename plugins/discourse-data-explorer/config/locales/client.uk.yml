      help:
        label: "Довідка"
        modal_title: "Довідка з огляду даних"
        auto_resolution: "<h2>Автоматичне розпізнавання сутностей</h2> <p>Коли ваш запит повертає ідентифікатор сутності, Data Explorer може автоматично замінити його на назву сутності та іншу корисну інформацію в результатах запиту. Автоматичне перетворення доступне для <i><b>user_id</b></i>, <i><b>group_id</b></i>, <i><b>topic_id</b></i>, <i><b>category_id</b></i> та <i><b>badge_id</b></i>. Щоб перевірити це, виконайте такий запит:</p> <pre><code>SELECT user_id\nFROM posts</code></pre>"
        custom_params: "<h2>Створення користувацьких параметрів</h2> <p>Щоб створити власні параметри для ваших запитів, розмістіть це у верхній частині запиту та дотримуйтесь формату:</p> <pre><code>-- [params]\n-- int:num = 1\n\nSelect:num</code></pre> <p><i>Примітка: перший рядок з [params] обов'язковий, а також два тире, що передують йому, і кожен користувацький параметр, який потрібно оголосити.</i></p>"
        default_values: "<h3>Типові значення</h3> <p>Ви можете оголосити параметри з або без значень за промовчанням. Стандартні значення з'являться в текстовому полі нижче редактора запитів, який ви зможете редагувати вашим потребам. Параметри, оголошені без стандартних значень, все ще створюватимуть текстове поле, але будуть порожніми і виділеними червоними.</p> <pre><code>-- [params]\n-- текст :username = my_username\n-- позначити :age</code></pre>"
        data_types: "<h3>Типи даних</h3> <p>Ось поширені типи даних, які ви можете використовувати:</p> <ul> <li><b>ціле число</b> - чотирибайтове ціле число зі знаком</li> <li><b>текст</b> - рядок символів змінної довжини</li> <li><b>логічне число</b> – true/false</li> <li><b>date</b> - календарна дата (рік, місяць, день)</li> <li><b>current_user_id</b> - ідентифікатор користувача, який виконує запит (автоматично вводиться, корисно для групових звітів)</li> </ul> <p>Для отримання додаткової інформації про типи даних відвідайте <a href='http://www.postgresql.org/docs/9.3/static/datatype.html#DATATYPE-TABLE' target='_blank'>цей вебсайт</a>.</p>"
      schema:
