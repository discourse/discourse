pl_PL:
  site_settings:
    data_explorer_enabled: "Włącz eksplorator danych"
    data_explorer_ai_queries_enabled: "Włącz generowanie zapytań AI w Eksploratorze danych"
  discourse_ai:
    ai_bot:
      agents:
        ai_query_generator:
          name: "Generator zapytań Eksploratora danych"
          description: "Generuje zapytania SQL dla Eksploratora danych z języka naturalnego"
      tool_help:
        run_sql: "Uruchamia zapytanie SQL i zwraca wyniki"
      tool_summary:
        run_sql: "Uruchamianie zapytania SQL"
      tool_description:
        run_sql: "Uruchomiono zapytanie SQL"
  discourse_data_explorer:
    ai:
      error_agent_not_configured: "Agent AI nie jest skonfigurowany. Sprawdź ustawienia funkcji AI."
      error_no_sql_returned: "Sztuczna inteligencja nie zwróciła prawidłowego zapytania SQL. Spróbuj ponownie lub wpisz zapytanie ręcznie."
  discourse_automation:
    scriptables:
      recurring_data_explorer_result_pm:
        title: Zaplanuj PW z wynikami eksploratora danych
        description: Otrzymuj zaplanowane raporty wysyłane na Twoje wiadomości
        no_csv_allowed: "W przypadku korzystania z pola `attach_csv` należy dodać `csv` do listy autoryzowanych rozszerzeń w ustawieniach witryny."
      recurring_data_explorer_result_topic:
        title: Zaplanuj post w temacie z wynikami eksploratora danych
        description: Otrzymuj zaplanowane raporty publikowane w określonym temacie
  data_explorer:
    report_generator:
      private_message:
        title: "Zaplanowany raport dla %{query_name}"
        body: |
          Cześć, %{recipient_name}. Twój raport eksploratora danych jest gotowy.

          Nazwa zapytania:
          %{query_name}

          Oto wyniki:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Wyświetl zapytanie w eksploratorze danych</a>

          Raport utworzony o %{created_at} (%{timezone})
      post:
        body: |
          ### Zaplanowany raport dla %{query_name}

          Oto wyniki:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Wyświetl zapytanie w eksploratorze danych</a>

          Raport utworzony o %{created_at} (%{timezone})
      upload_appendix: "Dodatek: [%{filename}|załącznik](%{short_url})"
