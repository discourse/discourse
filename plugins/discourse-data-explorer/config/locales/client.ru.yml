        label: "Помощь"
        modal_title: "Проводник данных. Справка."
        auto_resolution: "<h2>Автоматическое разрешение сущностей</h2> <p>Когда ваш запрос возвращает идентификатор сущности, Data Explorer может автоматически заменить его именем сущности и другой полезной информацией в результатах запроса. Автоматическое разрешение доступно для <i><b>user_id</b></i>, <i><b>group_id</b></i>, <i><b>topic_id</b></i>, <i><b>category_id</b></i> и <i><b>badge_id</b></i>. Чтобы попробовать это, выполните следующий запрос:</p> <pre><code>SELECT user_id\nFROM posts</code></pre>"
        custom_params: "<h2>Создание настраиваемых параметров</h2> <p>Чтобы создать настраиваемые параметры для ваших запросов, поместите эти данные в верхней части запроса, придерживаясь следующего формата:</p> <pre><code>- [params]\n- int: num = 1\n\nSELECT: num</code></pre> <p><i>Примечание. : первая строка с [params] обязательна, с двумя дефисами перед ней и всеми настраиваемыми параметрами, которые вы хотите объявить.</i></p>"
        default_values: "<h3>Значения по умолчанию</h3> <p>Вы можете объявлять параметры со значениями по умолчанию или без них. Значения по умолчанию будут отображаться в текстовом поле под редактором запросов, которое вы можете отредактировать в соответствии со своими потребностями. Параметры, объявленные без значений по умолчанию, по-прежнему будут создавать текстовое поле, но оно будет пустым и выделено красным цветом.</p> <pre><code>-- [параметры]\n-- text :username = my_username\n-- int :age</code></pre>"
        data_types: "<h3>Типы данных</h3> <p>Вот распространенные типы данных, которые вы можете использовать:</p> <ul> <li><b>integer</b> - четырехбайтовое знаковое целое число</li> <li><b>text</b> - строка переменной длины</li> <li><b>boolean</b> – правда/ложь</li> <li><b>date</b> - календарная дата (год, месяц, день)</li> <li><b>current_user_id</b> - ID пользователя, выполняющего запрос (автоматически внедряется, полезно для групповых отчетов)</li> </ul> <p>Для получения дополнительной информации о типах данных посетите <a href='http://www.postgresql.org/docs/9.3/static/datatype.html#DATATYPE-TABLE' target='_blank'>этот веб-сайт</a>.</p>"
