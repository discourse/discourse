de:
  site_settings:
    data_explorer_enabled: "Daten-Explorer aktivieren"
    data_explorer_ai_queries_enabled: "KI-gestützte Abfrageerstellung im Daten-Explorer"
  discourse_ai:
    ai_bot:
      agents:
        ai_query_generator:
          name: "Daten-Explorer-Abfrageerstellung"
          description: "Erstellt SQL-Abfragen für den Daten-Explorer aus natürlicher Sprache"
      tool_help:
        run_sql: "Führt eine SQL-Abfrage aus und gibt die Ergebnisse zurück"
      tool_summary:
        run_sql: "Ausführen der SQL-Abfrage"
      tool_description:
        run_sql: "SQL-Abfrage ausgeführt"
  discourse_data_explorer:
    ai:
      error_agent_not_configured: "Der KI-Agent ist nicht konfiguriert. Bitte überprüfe die Einstellungen für die KI-Funktionen."
      error_no_sql_returned: "Die KI hat keine gültige SQL-Abfrage zurückgegeben. Bitte versuche es erneut oder gib die Abfrage manuell ein."
  discourse_automation:
    scriptables:
      recurring_data_explorer_result_pm:
        title: Plane eine PN mit den Ergebnissen des Daten-Explorers
        description: Geplante Berichte an deine Nachrichten schicken
        no_csv_allowed: "Wenn das Feld `attach_csv` verwendet wird, muss `csv` zur Liste der autorisierten Erweiterungen in den Website-Einstellungen hinzugefügt werden."
      recurring_data_explorer_result_topic:
        title: Einen Beitrag in einem Thema mit Daten-Explorer-Ergebnissen planen
        description: Geplante Berichte zu einem bestimmten Thema veröffentlichen
  data_explorer:
    admin_dashboard_label: "Daten-Explorer"
    report_generator:
      private_message:
        title: "Geplanter Bericht für %{query_name}"
        body: |
          Hallo %{recipient_name}, dein Daten-Explorer-Bericht ist fertig.

          Anfragename:
          %{query_name}

          Hier sind die Ergebnisse:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Abfrage im Daten-Explorer anzeigen</a>

          Bericht erstellt um %{created_at} (%{timezone})
      post:
        body: |
          ### Geplanter Bericht für %{query_name}

          Hier sind die Ergebnisse:
          %{table}

          <a href='%{base_url}/admin/plugins/discourse-data-explorer/queries/%{query_id}'>Abfrage im Daten-Explorer anzeigen</a>

          Bericht erstellt um %{created_at} (%{timezone})
      upload_appendix: "Anhang: [%{filename}|attachment](%{short_url})"
