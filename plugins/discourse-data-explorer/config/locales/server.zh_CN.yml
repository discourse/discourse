zh_CN:
  site_settings:
    data_explorer_enabled: "启用数据资源管理器"
    data_explorer_ai_queries_enabled: "在数据浏览器中启用 AI 查询生成"
  discourse_ai:
    ai_bot:
      agents:
        ai_query_generator:
          name: "数据浏览器查询生成器"
          description: "从自然语言生成数据浏览器的 SQL 查询"
      tool_help:
        run_sql: "运行 SQL 查询并返回结果"
      tool_summary:
        run_sql: "运行 SQL 查询"
      tool_description:
        run_sql: "已运行 SQL 查询"
  discourse_data_explorer:
    ai:
      error_agent_not_configured: "AI代理尚未配置。请检查AI功能设置。"
      error_no_sql_returned: "AI未返回有效的SQL查询语句。请重试或手动编写查询语句。"
  discourse_automation:
    scriptables:
      recurring_data_explorer_result_pm:
        title: 使用数据资源管理器结果安排 PM
        description: 将定时报告发送到您的消息中
        no_csv_allowed: "使用 `attach_csv` 字段时，必须将 `csv` 添加到网站设置中的授权扩展程序列表中。"
      recurring_data_explorer_result_topic:
        title: 使用数据资源管理器结果安排某一话题的帖子
        description: 将定时报告发布到特定话题
  data_explorer:
    report_generator:
      private_message:
        title: "%{query_name} 的定时报告"
        body: |
          %{recipient_name}，您好！您的数据资源管理器已准备就绪。

          查询名称：
          %{query_name}

          结果如下：
          %{table}

          <a href='%{base_url}/admin/plugins/explorer/queries/%{query_id}'>在数据资源管理器中查看查询</a>

          报告创建时间：%{created_at} (%{timezone})
      post:
        body: |
          ### %{query_name} 的定时报告

          结果如下：
          %{table}

          <a href='%{base_url}/admin/plugins/explorer/queries/%{query_id}'>在数据资源管理器中查看查询</a>

          报告创建时间：%{created_at} (%{timezone})
      upload_appendix: "附录：[%{filename}|附件](%{short_url})"
