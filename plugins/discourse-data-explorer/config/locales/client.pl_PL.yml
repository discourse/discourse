        label: "Pomoc"
        modal_title: "Pomoc eksploratora danych"
        auto_resolution: "<h2>Automatyczne rozpoznawanie encji</h2> <p>Gdy zapytanie zwróci identyfikator encji, Data Explorer może automatycznie zastąpić go nazwą encji i innymi przydatnymi informacjami w wynikach zapytania. Automatyczne rozwiązanie jest dostępne dla <i><b>user_id</b></i>, <i><b>group_id</b></i>, <i><b>topic_id</b></i>, <i><b>category_id</b></i> i <i><b>badge_id</b></i>Aby to wypróbować, uruchom następujące zapytanie:</p> <pre><code>SELECT user_id\nFROM posts</code></pre>"
        custom_params: "<h2>Tworzenie parametrów niestandardowych</h2> <p>Aby utworzyć parametry niestandardowe dla zapytań, umieść to na górze zapytania i postępuj zgodnie z formatem:</p> <pre><code>-- [params]\n-- int :num = 1\n\nSELECT :num</code></pre> <p><i>Uwaga: wymagany jest pierwszy wiersz z [params], wraz z dwoma poprzedzającymi go myślnikami i każdym parametrem niestandardowym, który chcesz zadeklarować.</i></p>"
        default_values: "<h3>Wartości domyślne</h3> <p>Parametry można deklarować z wartościami domyślnymi lub bez nich. Wartości domyślne pojawią się w polu tekstowym poniżej edytora zapytań, które można edytować według własnych potrzeb. Parametry zadeklarowane bez wartości domyślnych nadal wygenerują pole tekstowe, ale będą puste i podświetlone na czerwono.</p> <pre><code>-- [params]\n-- text :username = my_username\n-- int :age</code></pre>"
        data_types: "<h3>Typy danych</h3> <p>Oto popularne typy danych, których możesz używać:</p> <ul> <li><b>liczba całkowita</b> - czterobajtowa liczba całkowita ze znakiem</li> <li><b>tekst</b> - ciąg znaków o zmiennej długości</li> <li><b>wartość logiczna</b> – prawda/fałsz</li> <li><b>data</b> - data kalendarzowa (rok, miesiąc, dzień)</li> <li><b>current_user_id</b> - ID użytkownika uruchamiającego zapytanie (wstrzykiwane automatycznie, przydatne w raportach grupowych)</li> </ul> <p>Aby uzyskać więcej informacji na temat typów danych, odwiedź <a href='http://www.postgresql.org/docs/9.3/static/datatype.html#DATATYPE-TABLE' target='_blank'>tę witrynę</a>.</p>"
