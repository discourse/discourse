discourse_data_explorer:
  data_explorer_enabled:
    default: false
    client: true
  data_explorer_ai_queries_enabled:
    default: false
    client: true
    depends_on:
      - discourse_ai_enabled
    depends_behavior: hidden
  data_explorer_query_generation_agent:
    default: "-1492485"
    type: enum
    enum: "DiscourseDataExplorer::AiAgentEnumerator"
    depends_on:
      - discourse_ai_enabled
    depends_behavior: hidden
  data_explorer_query_result_limit:
    default: 1000
    hidden: true
    max: 10000
