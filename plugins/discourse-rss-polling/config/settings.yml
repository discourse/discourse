plugins:
  rss_polling_enabled:
    default: false
    shadowed_by_global: true

  rss_polling_frequency:
    min: 10
    max: 180
    default: 30
    client: false

  rss_polling_feed_request_timeout:
    min: 5
    max: 300
    default: 30
    client: false

  rss_polling_verbose_logging:
    default: false
    client: false

  rss_polling_use_pubdate:
    default: false
    client: false

  rss_polling_update_tags:
    default: true
    client: false