uk:
  site_settings:
    discourse_reactions_like_icon: "Визначає піктограму, яка використовується для головної кнопки реакції. Це має бути назва піктограми <a href='https://fontawesome.com/v6/search?o=r&m=free' target='_blank'>Font Awesome</a> , а не назва емодзі."
    discourse_reactions_reaction_for_like: "Визначає реакцію, пов’язану з дією Like. Історичні записи Like не будуть змінені, якщо цей параметр зміниться, <strong>рекомендуємо</strong> , щоб цей параметр ніколи не змінювали."
    discourse_reactions_enabled: "Увімкніть плагін дискурс-реакцій."
    enable_new_post_reply_count_position: "Перемістіть підсумок реакцій на допис перед підрахунком відповідей в елементах керування дописом."
    discourse_reactions_enabled_reactions: "Визначає список дозволених реакцій, тут дозволені будь-які емодзі."
    discourse_reactions_desaturated_reaction_panel: "Зменшує візуальний шум реакцій, показуючи їх ненасиченими до наведення курсору."
    discourse_reactions_excluded_from_like: "Реакції, які не вважаються схожими. Будь-які реакції яких немає в цьому списку, будуть розглядатися як лайк для значків, звітів та інших цілей."
    discourse_reactions_like_sync_enabled: "Якщо ця опція увімкнена, для попередніх реакцій будуть створюватися відповідні записи «Подобається», за винятком тих реакцій, що визначені за адресою {{setting:discourse_reactions_excluded_from_like}}. Ця синхронізація відбуватиметься регулярно у фоновому режимі, а також під час зміни налаштувань за адресою {{setting:discourse_reactions_excluded_from_like}}."
    discourse_reactions_allow_any_emoji: "Якщо цю опцію ввімкнено, буде додано кнопку, яка дозволить користувачам вибирати будь-які емодзі у засобі вибору реакцій. Учасники зможуть вибирати будь-які емодзі, включаючи власні емодзі, для реакцій. Щоб обмежити доступні реакції, скористайтеся налаштуванням сайту {{setting:emoji_deny_list}}."
    enable_discourse_reactions_by_default: "Змінить значення за замовчуванням для параметра « {{setting:discourse_reactions_enabled}} » з «відключено» на «увімкнено», коли буде введено це майбутнє оновлення."
    errors:
      invalid_excluded_emoji: "Ви не можете виключати емодзі, яких немає в «реакції з увімкненими функціями Discourse Reactions» (окрім вбудованих виключень за замовчуванням), а також не можете виключати емодзі, що використовуються для «реакції Discourse Reactions на лайк»."
  badges:
    first_reaction:
      name: Перша реакція
      description: Відреагував на допис
      long_description: |
        Цей значок надається, коли ви вперше реагуєте на публікацію. Реакція на публікації – це чудовий спосіб повідомити іншим учасникам спільноти, що їхня публікація була цікавою, корисною, класною або веселою. Поділіться своєю реакцією!
  reports:
    reactions:
      title: "Реакції"
      description: "Список останніх реакцій."
      labels:
        day: "День"
