pl_PL:
  site_settings:
    discourse_reactions_like_icon: "Definiuje ikonę używaną dla głównego przycisku reakcji. Powinna to być nazwa ikony <a href='https://fontawesome.com/v6/search?o=r&m=free' target='_blank'>Font Awesome</a> , a nie nazwa emoji."
    discourse_reactions_reaction_for_like: "Określa reakcję związaną z czynnością polubienia. Rekordy polubień nie zostaną zmienione, jeśli to ustawienie ulegnie zmianie, dlatego <strong>zdecydowanie</strong> zaleca się, aby nigdy nie zmieniać tego ustawienia."
    discourse_reactions_enabled: "Włącz wtyczkę discourse-reactions."
    enable_new_post_reply_count_position: "Przenieś podsumowanie reakcji na wpis przed licznik odpowiedzi w elementach sterujących wpisem."
    discourse_reactions_enabled_reactions: "Określa listę włączonych reakcji, tutaj dozwolone są dowolne emoji."
    discourse_reactions_desaturated_reaction_panel: "Zmniejsza szum wizualny reakcji, wyświetlając je w stanie odbarwionym aż do momentu najechania kursorem."
    discourse_reactions_excluded_from_like: "Reakcje, które nie liczą się jako polubienie. Wszelkie reakcje, których nie ma na tej liście, będą liczone jako polubienie w przypadku odznak, zgłaszania i innych celów."
    discourse_reactions_like_sync_enabled: "Jeśli ta opcja jest włączona, w historycznych reakcjach zostaną utworzone odpowiadające im rekordy „Lubię to”, z wyjątkiem reakcji zdefiniowanych w {{setting:discourse_reactions_excluded_from_like}}. Synchronizacja będzie odbywać się regularnie w tle, a także po zmianie {{setting:discourse_reactions_excluded_from_like}}."
    discourse_reactions_allow_any_emoji: "Po włączeniu tej opcji pojawi się przycisk umożliwiający użytkownikom wybór dowolnych emoji w selektorze reakcji. Użytkownicy będą mogli wybierać dowolne emoji, w tym niestandardowe, w reakcjach. Aby ograniczyć liczbę dostępnych reakcji, użyj ustawienia witryny {{setting:emoji_deny_list}}."
    enable_discourse_reactions_by_default: "Zmienia domyślną wartość ustawienia {{setting:discourse_reactions_enabled}} z wyłączonego na włączone, gdy nadchodząca zmiana zostanie włączona."
    errors:
      invalid_excluded_emoji: "Nie można wykluczyć emoji, które nie znajdują się w „reakcjach z włączonymi reakcjami discourse” (poza wbudowanymi, domyślnymi wykluczeniami) i nie można wykluczyć emoji używanych w „reakcjach discourse na polubienie”."
  badges:
    first_reaction:
      name: Pierwsza reakcja
      description: Zareagowano na post
      long_description: |
        Ta odznaka jest przyznawana za pierwszym razem, gdy użyjesz selektora reakcji emoji, aby zareagować na wpis. To coś innego niż standardowe polubienie: to świetny sposób, aby dać znać innym członkom społeczności, że to, co opublikowali, było interesujące, przydatne, fajne lub zabawne!”
  reports:
    reactions:
      title: "Reakcje"
      description: "Wymień najnowsze reakcje."
      labels:
        day: "Dzień"
