    discourse_reactions_excluded_from_like: "不计为“赞”的回应。任何不在此列表中的回应都将计为“赞”，用于徽章、报告和其他目的。"
    discourse_reactions_like_sync_enabled: "如果启用此功能，历史反应将创建与其匹配的“赞”记录，但 {{setting:discourse_reactions_excluded_from_like}}中定义的反应除外。此同步将在后台定期进行，并在您更改 {{setting:discourse_reactions_excluded_from_like}}时进行。"
