ur:
  site_settings:
    discourse_narrative_bot_enabled: "ڈسکورس بیانیہ بوٹ (ڈیسکو بوٹ) کو فعال کریں"
    disable_discourse_narrative_bot_welcome_post: "ڈسکورس بیانیہ بوٹ کے ذریعہ استقبالیہ دھاگے کو غیر فعال کریں"
    discourse_narrative_bot_ignored_usernames: "وہ صارف نام جنہیں ڈسکورس بیانیہ بوٹ کو نظر انداز کرنا چاہیے"
    discourse_narrative_bot_disable_public_replies: "ڈسکورس بیانیہ بوٹ کے ذریعے عوامی جوابات کو غیر فعال کریں"
    discourse_narrative_bot_welcome_post_type: "استقبالیہ دھاگے کی قسم جسے ڈسکورس بیانیہ بوٹ کو بھیجنا چاہیے"
    discourse_narrative_bot_welcome_post_delay: "ڈسکورس بیانیہ بوٹ کے استقبالیہ پیغام بھیجنے سے پہلے (n) سیکنڈ کا انتظار۔"
    discourse_narrative_bot_skip_tutorials: "ڈسکورس بیانیہ بوٹ کے اسباق چھوڑنے کے لیے"
  badges:
    certified:
      name: سندیافتہ
      description: "ہمارا نئے صارف کا سبق مکمل کیا"
      long_description: |
        یہ تمغہ نئے صارف کے سبق کی کامیاب تکمیل پر دیا جاتا ہے۔ آپ نے مباحثے کے بنیادی اوزار سیکھنے کی پہل کی ہے، اور اس بات کی تصدیق کی جاتی ہے!
    licensed:
      name: سند یافتہ
      description: "ہمارا صارف اعلیٰ سبق مکمل کیا"
      long_description: |
        یہ تمغہ صارف کے اعلیٰ سبق کی کامیاب تکمیل پر دیا جاتا ہے۔ آپ نے بحث کے جدید اوزاروں میں مہارت حاصل کر لی ہے — اور اب آپ مکمل طور پر مجاز ہیں!
  discourse_narrative_bot:
    bio: "آداب، میں کوئی حقیقی انسان نہیں ہوں۔ میں ایک بوٹ ہوں جو آپ کو اس فورم کے بارے میں بتا سکتا ہے۔ مجھ سے بات کرنے کے لیے مجھے پیغام بھیجیں یا میرا نام لے کر ذکر کریں۔"
    tl2_promotion_message:
      subject_template: "اب جب کہ آپ کو ترقی مل گئی ہے، یہ کچھ جدید خصوصیات کے بارے میں جاننے کا وقت ہے!"
      text_body_template: |
        اس پیغام کا جواب `@%{discobot_username} %{reset_trigger}` کے ساتھ دیں تاکہ آپ کو معلوم ہو کہ آپ کیا کر سکتے ہیں۔
    timeout:
      message: |-
        آداب @%{username}، بس حال چال جاننے کے لیے پیغام بھیج رہا ہوں کیونکہ کافی عرصے سے آپ کی کوئی خبر نہیں ملی۔

        – جاری رکھنے کے لیے کسی بھی وقت مجھے جواب دیں۔

        – اگر آپ اس مرحلے کو چھوڑنا چاہتے ہیں تو `%{skip_trigger}` لکھیں۔

        – دوبارہ شروع کرنے کے لیے `%{reset_trigger}` لکھیں۔

        – اگر آپ نہیں چاہتے تو یہ بھی ٹھیک ہے۔ میں ایک روبوٹ ہوں۔ میرے جذبات کو ٹھیس نہیں پہنچے گی۔ :sob:
    dice:
      trigger: "لڈو"
      invalid: |-
        مجھے افسوس ہے، ریاضی کے اعتبار سے ان پاسوں کے اس امتزاج کو رول کرنا ناممکن ہے۔ :confounded:
      not_enough_dice:
        one: "میرے پاس صرف ' %{count} ' کے پاسے ہیں۔ باعث شرم ہے، مجھے معلوم ہے!"
        other: "میرے پاس صرف ' %{count} ' کے پاسے ہیں۔ باعث شرم ہے، مجھے معلوم ہے!"
      out_of_range: |-
        کیا آپ جانتے ہیں کہ ریاضیاتی طور پر منصفانہ پاسے کے لیے [سائیڈز کی زیادہ سے زیادہ تعداد](https://www.wired.com/2016/05/mathematical-challenge-of-designing-the-worlds-most-complex-120-sided-dice) 120 ہوتی ہیں؟
      results: |-
        > :game_die: %{results}
    quote:
      trigger: "اقتباس"
      "1":
        quote: "ہر مشکل کے بیچ میں ایک سنہری موقع بھی ہوتا ہے"
        author: "البرٹ آئن اسٹائن"
      "2":
        quote: "اگر آزادی میں غلطی کرنے کی آزادی شامل نہ ہو تو آزادی کا کوئی فائدہ نہیں۔"
        author: "مہاتما گاندھی"
      "3":
        quote: "اس بات پر رونا مت کہ یہ ختم ہو گیا، اس بات پر مسکراؤ کہ یہ واقعہ ہوا۔"
        author: "ڈاکٹر سیوس"
      "4":
        quote: "اگر آپ چاہتے ہیں کہ کوئی کام صحیح طریقے سے ہو تو اپنے ہاتھ سے کریں۔"
        author: "چارلس-گویلوم ایتینی"
      "5":
        quote: "آپ کا یقین کہ آپ کر سکتے ہیں آپ کا آدھا سفر کم کر دیتا ہے۔"
        author: "تھیوڈور روزویلٹ"
      "6":
        quote: "زندگی چاکلیٹ کے ڈبے کی طرح ہے۔ آپ کبھی نہیں جانتے کہ آپ کو کیا ملنے والا ہے۔"
        author: "فارسٹ گمپ کی ماں"
      "7":
        quote: "یہ ایک آدمی کے لیے ایک چھوٹا قدم ہے، اور انسانیت کے لیے ایک عظیم چھلانگ۔"
        author: "نیل آرمسٹرانگ"
      "8":
        quote: "ہر روز ایک ایسا کام کریں جو آپ کو خوفزدہ کرے۔"
        author: "ایلینور روزویلٹ"
      "9":
        quote: "غلطیاں ہمیشہ معاف کی جا سکتی ہیں، اگر کسی میں انہیں تسلیم کرنے کی ہمت ہو۔"
        author: "برُوس لی"
      "10":
        quote: "انسان کا ذہن جس کا تصور اور یقین کر سکتا ہے، وہ حاصل کر سکتا ہے۔"
        author: "نیپولین ہِل"
      "11":
        quote: "گھر میں امن، دنیا میں امن۔"
        author: "مصطفی کمال اتاترک"
      "12":
        quote: "تعلیم غربت سے فرار کا راستہ نہیں بلکہ اس سے لڑنے کا ذریعہ ہے۔"
        author: "جولیس نیریر"
      "13":
        quote: "ہزار میل کا سفر ایک قدم سے ہی شروع ہوتا ہے۔"
        author: "لاؤ زو"
      results: |-
        > :left_speech_bubble: _%{quote}_ &mdash; %{author}
    magic_8_ball:
      trigger: "قسمت"
      answers:
        "1": "یہ یقینی ھے"
        "2": "یہ یقیناً ایسا ہی ہے۔"
        "3": "بلا شبہ"
        "4": "جی ہاں یقیناً"
        "5": "آپ اس پر بھروسہ کر سکتے ہیں"
        "6": "جیسا میں اسے دیکھتا ہوں، جی ہاں"
        "7": "زیادہ تر ممکن ہے"
        "8": "مستقبل اچھا لگ رہا ہے"
        "9": "جی ہاں"
        "10": "نشانیاں ہاں کی طرف اشارہ کر رہی ہیں"
        "11": "جواب مبہم ہے، دوبارہ کوشش کریں۔"
        "12": "بعد میں دوبارہ پوچھیں"
        "13": "ابھی بتانا بہتر نہیں"
        "14": "ابھی پیشن گوئی نہیں کی جا سکتی"
        "15": "دھیان مرکوز کریں اور دوبارہ پوچھیں"
        "16": "اس پر انحصار نہ کریں"
        "17": "میرا جواب نہیں میں ہے"
        "18": "میرے ذرائع کے جواب نہیں میں ہے"
        "19": "مستقبل بہت اچھا نہیں دکھ رہا"
        "20": "بہت مشکوک"
      result: |-
        > :crystal_ball: %{result}
    track_selector:
      reset_trigger: "شروع"
      skip_trigger: "چھوڑیں"
      help_trigger: "مدد"
      random_mention:
        reply: |-
          آداب! یہ جاننے کے لیے کہ میں کیا کر سکتا ہوں، `@%{discobot_username} %{help_trigger} ` لکھیں۔
        tracks: |-
          میں اس وقت درج ذیل کام کر سکتا ہوں:

          `@%{discobot_username} %{reset_trigger} {name-of-tutorial}`
          > ایک ذاتی پیغام میں صرف آپ کے لیے ایک انٹرایکٹو ٹیوٹوریل شروع کرسکتا ہے۔ `{name-of-tutorial}` مندرجہ ذیل میں سے کوئی ایک ہو سکتا ہے: `%{tracks}`۔
        bot_actions: |-
          `@%{discobot_username} %{dice_trigger} 2d6`
          > :game_die: 3, 6

          `@%{discobot_username} %{quote_trigger}`
          %{quote_sample}

          `@%{discobot_username} %{magic_8_ball_trigger}`
          > :crystal_ball: آپ اس پر بھروسہ کر سکتے ہیں
        discobot_disabled: آپ نے اپنی ترتیبات میں مجھے غیر فعال کی ہوا ہے۔ آپ کو نئے صارف کے آن بورڈنگ ٹپس کو میرے ساتھ تعامل کرنے کی اجازت دینی ہوگی۔
      do_not_understand:
        first_response: |-
          ارے، جواب دینے کا شکریہ!

          بدقسمتی سے، ایک ناقص پروگرام شدہ بوٹ ہونے کے ناطے، میں اسے بالکل سمجھ نہیں پا رہا۔ :frowning:
        track_response: آپ دوبارہ کوشش کر سکتے ہیں، یا اگر آپ اس مرحلے کو چھوڑنا چاہتے ہیں تو `%{skip_trigger}` لکھیں۔ ورنہ دوبارہ شروع کرنے کے لیے `%{reset_trigger}`۔
        second_response: |-
          اوہ، معذرت۔ مجھے ابھی بھی سمجھ نہیں آیاہے۔ :anguished:

          میں صرف ایک بوٹ ہوں، لیکن اگر آپ کسی حقیقی شخص تک پہنچنا چاہتے ہیں تو دیکھیں [ہمارا رابطہ کا صفحہ](%{base_path}/about)۔

          اس دوران، میں آپ کے راستے سے دور رہوں گا۔
    new_user_narrative:
      reset_trigger: "سبق"
      title: "نئے صارف کا سبق مکمل کرنے کا سندنامہ"
      cert_title: "نئے صارف کے سبق کی کامیاب تکمیل کے اعتراف میں"
      hello:
        title: "آداب!"
        message: |-
          %{title} شمولیت کا شکریہ، اور خوش آمدید!

          - میں صرف ایک روبوٹ ہوں، لیکن اگر آپ کو کسی انسان سے رابطہ کرنا ہو تو [ہمارا دوستانہ عملہ](%{base_uri}/about) بھی مدد کے لیے موجود ہے۔

          - حفاظتی وجوہات کی بنا پر، ہم عارضی طور پر نئے صارفین کی صلاحیتوں کو محدود کرتے ہیں۔ جیسے جیسے ہم آپ کو جانیں گے، آپ کو [نئے فعالیت کے درجے](https://blog.discourse.org/2018/06/understanding-discourse-trust-levels/) (اور [تمغات](%{base_uri}/badges)) حاصل ہوں گے۔

          - ہم ہر وقت [شائستہ کمیونٹی رویے](%{base_uri}/guidelines ) میں یقین رکھتے ہیں۔
      onebox:
        instructions: |-
          اگلا، کیا آپ ان میں سے ایک لنک مجھے بھیج سکتے ہیں؟ جواب میں صرف ایک لائن میں ایک لنک لکھیں، یہ خود بخود ایک شاندار خلاصہ شامل کر دے گا۔

          کسی بھی لنک کو کاپی کرنے کے لیے موبائل پر دبائیں اور تھامیں، یا اپنے کرسر سے دائیاں کلک کریں:

          [https://en.wikipedia.org/wiki/Inherently_funny_word](https://en.wikipedia.org/wiki/Inherently_funny_word)
          [https://en.wikipedia.org/wiki/Death_by_coconut](https://en.wikipedia.org/wiki/Death_by_coconut)
          [https://en.wikipedia.org/wiki/Calculator_spelling](https://en.wikipedia.org/wiki/Calculator_spelling)
        reply: |-
          زبردست! یہ زیادہ تر <img src="%{base_uri}/plugins/discourse-narrative-bot/images/font-awesome-link.png" width="16" height="16"> کے رابطوں پر کام کریگا۔ یاد رکھیں، یہ ایک الگ لائن پر ہونا چاہیے، اس کے آگے یا پیچھے کچھ بھی نہیں ہونا چاہیے۔
        not_found: |-
          معذرت، مجھے آپ کے جواب میں رابطہ نہیں ملا! :cry:

          کیا آپ اپنی اگلے جواب میں درج ذیل لنک کو ایک الگ لائن میں شامل کرنے کی کوشش کریں گے؟

          [https://en.wikipedia.org/wiki/Exotic_Shorthair](https://en.wikipedia.org/wiki/Exotic_Shorthair)
      images:
        instructions: |-
          یہ ایک یونیکورن کی تصویر ہے:

          <img src="%{base_uri}/plugins/discourse-narrative-bot/images/unicorn.png" width="520" height="520">

          اگر آپ کو یہ پسند آئے (اور کون نہیں پسند کرے گا!) تو نیچے دیے گئے اس دھاگے کے 'Like :heart: ' بٹن کو دبا کر مجھے بتائیں۔

          کیا آپ **تصویر کے ساتھ جواب دے سکتے ہیں؟** کوئی بھی تصویر چلے گی! اسے ڈریگ اور ڈراپ کریں، اپ لوڈ بٹن دبائیں، یا کاپی کر کے پیسٹ کر دیں۔
        reply: |-
          اچھی تصویر - آپ کو بتانے کیلئے کہ یہ مجھے کتنی پسند ائی ہے میں نے پسندیدگی :heart: کا بٹن دبایا :heart_eyes:
        like_not_found: |-
          کیا آپ میرے [دھاگے](%{url}) کو پسند کرنا بھول گئے؟ :heart: :crying_cat_face:
        not_found: |-
          ایسا لگتا ہے کہ آپ نے کوئی تصویر اپ لوڈ نہیں کی اس لیے میں نے ایک تصویر منتخب کی ہے جس سے مجھے یقین ہے کہ آپ لطف اندوز ہوں گے۔

          <%{image_url}>

          اسے اپ لوڈ کرنے کی کوشش کریں، یا خود ہی ایک لائن میں رابطہ چسپاں کریں!
      likes:
        instructions: |-
          یہاں ایک یونیکورن کی تصویر ہے:

          <img src="%{base_uri}/plugins/discourse-narrative-bot/images/unicorn.png" width="520" height="520">

          اگر آپ اسے پسند کرتے ہیں (اور کون نہیں کرے گا!) آگے بڑھو اور مجھے بتانے کے لئے اس دھاگے کے نیچے :heart: بٹن کی طرح دبائیں.
        reply: |-
          میری پوسٹ کو پسند کرنے کا شکریہ!
        not_found: |-
          کیا آپ میرے [دھاگے](%{url}) کو پسند :heart: کرنا بھول گئے؟ :crying_cat_face:
      formatting:
        instructions: |-
          کیا آپ اپنے جواب میں کچھ الفاظ **بولڈ** یا _کشیدہ_ کر سکتے ہیں؟

          - `**بولڈ**` یا `_کشیدہ_` لکھیں

          - یا، دبائیں <kbd><b>B</b></kbd> یا <kbd><i>میں</i></kbd> ایڈیٹر میں **bold** یا _italic_ کے بٹن دبائیں۔
        reply: |-
          بہت اچھا کام! HTML اور BBCode فارمیٹنگ کے لیے بھی کام کرتے ہیں – مزید جاننے کے لیے، [اس سبق کو دیکھیں](https://commonmark.org/help) :nerd:
        not_found: |-
          افوہ، مجھے آپ کے جواب میں کوئی فارمیٹنگ نہیں ملی۔ :pencil2:

          کیا آپ دوبارہ کوشش کر سکتے ہیں؟ استعمال کریں <kbd><b>B</b></kbd> بولڈ یا <kbd><i>میں</i></kbd> اگر آپ پھنس جائیں تو ایڈیٹر میں B بولڈ یا I کشیدہ کے بٹن استعمال کریں۔
      quoting:
        instructions: |-
          کیا آپ جواب دیتے وقت میرا حوالہ دے سکتے ہیں، تاکہ مجھے بالکل معلوم ہو کہ آپ کس حصے کا جواب دے رہے ہیں؟

          > اگر یہ کافی ہے تو براہِ کرم مجھے چائے لائیں؛ لیکن اگر یہ چائے ہے تو براہِ کرم مجھے کافی لائیں۔
          >
          > خود سے بات کرنے کا ایک فائدہ یہ ہے کہ آپ جانتے ہیں کہ کم از کم کوئی تو سن رہا ہے۔
          >
