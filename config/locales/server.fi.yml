    body: "<a name=\"civilized\"></a> \n\n## [TÃĊmÃĊ on sivistynyt paikka julkiselle keskustelulle](#civilized) \n\nKohtele tÃĊtÃĊ keskustelufoorumia samalla kunnioituksella kuin kohtelisit julkista puistoa. Mekin olemme yhteinen yhteisÃ¶n resurssi ja paikka jakaa taitoja, tietoa ja kiinnostuksen kohteita jatkuvan keskustelun kautta.\n\nNÃĊmÃĊ eivÃĊt ole ehdottomia sÃĊÃĊntÃ¶jÃĊ. NÃĊmÃĊ ovat ohjeita, jotka auttavat yhteisÃ¶mme inhimillistÃĊ harkintakykyÃĊ ja pitÃĊvÃĊt tÃĊmÃĊn ystÃĊvÃĊllisenÃĊ paikkana sivistyneelle julkiselle keskustelulle.\n\n<a name=\"improve\"></a>\n\n## [Paranna keskustelua](#improve) \n\nAuta meitÃĊ tekemÃĊÃĊn tÃĊstÃĊ mahtava paikka keskustelulle lisÃĊÃĊmÃĊllÃĊ aina edes jotakin positiivista keskusteluun. Jos et ole varma siitÃĊ, mitÃĊ viestisi tuo keskusteluun, mieti mitÃĊ haluat sanoa ja kokeile myÃ¶hemmin uudelleen. \n\nYksi tapa parantaa keskustelua on tutustua jo kÃĊynnissÃĊ oleviin. KÃĊytÃĊ aikaa ketjujen selaamiseen ennen kuin vastaat niihin tai aloitat omasi, ja sinulla on paremmat mahdollisuudet tavata muita, jotka jakavat mielenkiinnon kohteesi. \n\nTÃĊÃĊllÃĊ keskustelluilla aiheilla on meille merkitystÃĊ, ja haluamme sinun kÃĊyttÃĊytyvÃĊn niin kuin niillÃĊ olisi merkitystÃĊ myÃ¶s sinullekin. Kunnioita aiheita ja niistÃĊ keskustelevia ihmisiÃĊ, vaikka olisitkin eri mieltÃĊ joistakin kommenteista. \n\n<a name=\"agreeable\"></a> \n## [Ole miellyttÃĊvÃĊ myÃ¶s silloin, kun olet eri mieltÃĊ](#agreeable) \n\nSaatat haluta vastata olemalla eri mieltÃĊ. Se on ok. Mutta muista _kritisoida ideoita, ÃĊlÃĊ ihmisiÃĊ_. VÃĊltÃĊ: \n\n* nimittelyÃĊ \n* ad hominen -hyÃ¶kkÃĊyksiÃĊ \n* vastaamista viestin sÃĊvyyn sen sisÃĊllÃ¶n sijaan \n* vaistomaista reagoimista \n\nTarjoa sen sijaan harkittuja ajatuksia, jotka parantavat keskustelua. \n\n<a name=\"participate\"></a> \n\n## [Osallistumisellasi on vÃĊliÃĊ](#participate) \n\nTÃĊÃĊllÃĊ kÃĊymÃĊmme keskustelut asettavat sÃĊvyn jokaiselle uudelle saapujalle. Auta meitÃĊ vaikuttamaan tÃĊmÃĊn yhteisÃ¶n tulevaisuuteen ottamalla osaa keskusteluihin, jotka tekevÃĊt tÃĊstÃĊ foorumista mielenkiintoisen paikan, ja vÃĊlttÃĊmÃĊllÃĊ niitÃĊ, jotka eivÃĊt tee. \n\nDiscourse tarjoaa tyÃ¶kaluja, joilla yhteisÃ¶ voi kollektiivisesti tunnistaa parhaat (ja huonoimmat) kontribuutiot: kirjanmerkit, tykkÃĊykset, merkinnÃĊt, vastaukset, muokkaukset, tarkkailu, vaimennus jne. KÃĊytÃĊ nÃĊitÃĊ tyÃ¶kaluja omasi ja kaikkien muidenkin kokemuksen parantamiseen. \n\nJÃĊtetÃĊÃĊn yhteisÃ¶mme parempaan tilaan kuin missÃĊ lÃ¶ysimme sen. \n\n<a name=\"flag-problems\"></a> \n\n## [Jos havaitset ongelman, liputa se](#flag-problems) \n\nValvojilla on erityinen valta, he vastaavat tÃĊstÃĊ foorumista. Mutta niin vastaat myÃ¶s sinÃĊkin. Avullasi valvojat voivat olla yhteisÃ¶n fasilitaattoreita, eivÃĊt vain siivoojia tai poliiseja. \n\nKun nÃĊet huonoa kÃĊyttÃĊytymistÃĊ, ÃĊlÃĊ vastaa. Vastaaminen kannustaa huonoon kÃĊytÃ¶kseen tiedostamalla sen, kuluttaa energiaasi ja tuhlaa kaikkien aikaa. _Merkitse se sen sijaan_. Jos merkintÃ¶jÃĊ kertyy tarpeeksi, toimia tehdÃĊÃĊn joko automaattisesti tai valvojan toimesta. \n\nYhteisÃ¶mme yllÃĊpitÃĊmiseksi valvojat pidÃĊttÃĊvÃĊt oikeuden poistaa mitÃĊ tahansa sisÃĊltÃ¶ÃĊ ja minkÃĊ tahansa kÃĊyttÃĊjÃĊtilin mistÃĊ tahansa syystÃĊ milloin tahansa. Valvojat eivÃĊt esikatsele uusia viestejÃĊ; valvojat ja sivuston yllÃĊpitÃĊjÃĊt eivÃĊt vastaa yhteisÃ¶ssÃĊ julkaistusta sisÃĊllÃ¶stÃĊ. \n\n<a name=\"be-civil\"></a> ## [Ole aina kohtelias](#be-civil) \n\nMikÃĊÃĊn ei pilaa tervettÃĊ keskustelua niin kuin tÃ¶ykeys: \n\n* Ole kohtelias. ÃlÃĊ julkaise mitÃĊÃĊn, mitÃĊ kohtuullinen henkilÃ¶ voisi pitÃĊÃĊ loukkaavana, herjaavana tai vihapuheena. \n* PidÃĊ sisÃĊltÃ¶ siistinÃĊ. ÃlÃĊ julkaise mitÃĊÃĊn hÃĊvytÃ¶ntÃĊ tai seksuaalista. \n* Kunnioittakaa toisianne. ÃlÃĊ hÃĊiritse ketÃĊÃĊn, matki ihmisiÃĊ tai paljasta heidÃĊn yksityisiÃĊ tietojaan. \n* Kunnioita foorumia. ÃlÃĊ lÃĊhetÃĊ roskapostia tai muutoin vandalisoi foorumia. \n\nNÃĊmÃĊ eivÃĊt ole tarkasti mÃĊÃĊriteltyjÃĊ tiukkoja ehtoja, ja niiden ei ole missÃĊÃĊn nimessÃĊ tarkoitus olla sellaisia. Jos olet epÃĊvarma, kysy itseltÃĊsi miltÃĊ sinusta tuntuisi, jos viestisi julkaistaisiin suuren uutissivuston etusivulla. \n\nTÃĊmÃĊ on julkinen foorumi, ja hakukoneet indeksoivat nÃĊitÃĊ keskusteluita. PidÃĊ kielenkÃĊyttÃ¶, linkit ja kuvat turvallisina perheenjÃĊsenille ja ystÃĊville. \n\n<a name=\"keep-tidy\"></a> \n\n## [PidÃĊ paikat siistinÃĊ](#keep-tidy) \n\nPyri laittamaan asiat oikeaan paikkaan, jotta voimme kÃĊyttÃĊÃĊ enemmÃĊn aikaa keskusteluun ja vÃĊhemmÃĊn aikaa siivoamiseen: \n\n* ÃlÃĊ aloita ketjua vÃĊÃĊrÃĊllÃĊ alueella; lue alueiden kuvaukset. \n* ÃlÃĊ lÃĊhetÃĊ samaa viestiÃĊ useaan ketjuun. \n* ÃlÃĊ lÃĊhetÃĊ vastauksia ilman sisÃĊltÃ¶ÃĊ. \n* ÃlÃĊ eksy ketjun aiheesta muuttamalla sitÃĊ kesken kaiken. \n* ÃlÃĊ lisÃĊÃĊ allekirjoituksia viesteihisi; jokaiseen viestiin on liitetty profiilitietosi. \n\nKÃĊytÃĊ tykkÃĊyspainiketta sen sijaan, ettÃĊ vastaisit â+1â tai âSamaa mieltÃĊâ. KÃĊytÃĊ Vastaa liittyvÃĊssÃĊ ketjussa -toimintoa sen sijaan, ettÃĊ ohjaisit olemassa olevan ketjun aivan eri suuntaan. \n\n<a name=\"stealing\"></a> \n\n## [Julkaise vain omaa sisÃĊltÃ¶ÃĊsi](#stealing) \n\nEt saa julkaista luvatta mitÃĊÃĊn digitaalista, joka kuuluu jollekulle muulle. Et saa julkaista kuvauksia, linkkejÃĊ tai menetelmiÃĊ jonkun immateriaalioikeuksien (ohjelmisto, video, ÃĊÃĊni, kuvat) rikkomiseen tai minkÃĊÃĊn muun lain rikkomiseen. \n\n<a name=\"power\"></a> \n## [Sinun yllÃĊpitÃĊmÃĊsi](#power) \n\nTÃĊtÃĊ sivustoa yllÃĊpitÃĊÃĊ [ystÃĊvÃĊllinen paikallinen henkilÃ¶kunta](%{base_path}/about) ja *te*, yhteisÃ¶. Jos sinulla on lisÃĊkysymyksiÃĊ siitÃĊ, miten asioiden tulisi toimia tÃĊÃĊllÃĊ, aloita uusi ketju alueella %{feedback_category}, ja keskustellaan siitÃĊ! Jos sinulla on kriittinen tai kiireellinen ongelma, jota ei voi kÃĊsitellÃĊ metaketjun tai liputuksen kautta, [ota yhteyttÃĊ valvojiin](%{base_path}/about).\n"
