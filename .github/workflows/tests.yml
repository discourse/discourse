name: Tests

on:
  pull_request:
    paths-ignore:
      - ".github/workflows/migration-tests.yml"
      - ".github/dependabot.yml"
      - ".github/labeler.yml"
      - "migrations/**"
  push:
    branches:
      - main
      - beta
      - stable
      - release/*

concurrency:
  group: tests-${{ format('{0}-{1}', github.head_ref || github.run_number, github.job) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    if: github.event_name == 'pull_request' || github.repository != 'discourse/discourse-private-mirror'
    name: plugins frontend
    runs-on: ubuntu-latest
    container: discourse/discourse_test:release
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    env:
      RAILS_ENV: test
      PGUSER: discourse
      PGPASSWORD: discourse
      USES_PARALLEL_DATABASES: false
      CAPYBARA_DEFAULT_MAX_WAIT_TIME: 20
      MINIO_RUNNER_LOG_LEVEL: DEBUG
      DISCOURSE_TURBO_RSPEC_RETRY_AND_LOG_FLAKY_TESTS: false
      CHEAP_SOURCE_MAPS: "1"
      MINIO_RUNNER_INSTALL_DIR: /home/discourse/.minio_runner
      TESTEM_BROWSER: Chrome
      TESTEM_FIREFOX_PATH: false
      EMBER_ENV: development
      LOAD_PLUGINS: 1
      QUNIT_REUSE_BUILD: 1

    steps:
      - name: Set working directory owner
        run: chown root:root .

      - name: Set QUNIT_PARALLEL for QUnit tests
        run: |
          echo "QUNIT_PARALLEL=$(($(nproc) / 2))" >> $GITHUB_ENV

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Git
        run: |
          git config --global user.email "ci@ci.invalid"
          git config --global user.name "Discourse CI"

      - name: Start redis
        run: redis-server /etc/redis/redis.conf &

      - name: Start Postgres
        run: |
          chown -R postgres /var/run/postgresql
          sudo -E -u postgres script/start_test_db.rb
          sudo -u postgres psql -c "CREATE ROLE $PGUSER LOGIN SUPERUSER PASSWORD '$PGPASSWORD';"

      - name: Symlink vendor/bundle from image
        run: |
          ln -s /var/www/discourse/vendor/bundle vendor/bundle

      - name: Setup gems
        run: |
          bundle config --local path vendor/bundle
          bundle config --local deployment true
          bundle config --local without development
          bundle install --jobs $(($(nproc) - 1))
          bundle clean

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Checkout official plugins
        run: bin/rake plugin:install_all_official

      - name: Symlinking plugin gems from image
        run: |
          for dir in /var/www/discourse/plugins/*/gems; do
            plugin_name=$(basename "$(dirname "$dir")")
            plugin_dir="plugins/$plugin_name"
            gem_dir="$plugin_dir/gems"

            if [ ! -d "$plugin_dir" ]; then
              echo "Skipping $plugin_name: Plugin directory does not exist"
            elif [ -d "$gem_dir" ]; then
              echo "Skipping $plugin_name: Source gems directory exists"
            else
              echo "Symlinking $dir to $gem_dir"
              ln -s "$dir" "$gem_dir"
            fi
          done

      - name: Get CPU cores
        id: cpu-info
        run: echo "cpu-cores=$(nproc)" >> $GITHUB_OUTPUT

      - name: Fetch app state cache
        uses: actions/cache@v5
        id: app-cache
        with:
          path: tmp/app-cache
          key: >-
            Linux- 4- ef30576195b6911f3c671efda268e53cd1c5ffe76219ec7be445a1003fd3fa1e- e9c2cea9ccccca261fcdee1ba5f0b471a211a9f784ace6fbd870049452cd43af- adb103188e26789ff33d34972331b0afe19d40b86f91e70e1dae8e1e5d7a1f23- 1- false- - plugins-

      - name: Restore database from cache
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: script/silence_successful_output psql --quiet -o /dev/null -f tmp/app-cache/cache.sql postgres

      - name: Restore uploads from cache
        if: steps.app-cache.outputs.cache-hit == 'true'
        run: rm -rf public/uploads && cp -r tmp/app-cache/uploads public/uploads

      - name: Create and migrate database
        run: |
          bin/rake db:create
          script/silence_successful_output bin/rake db:migrate

      - name: Ember Build
        run: script/assemble_ember_build.rb

      - name: Capture build info
        if: always()
        run: |
          mkdir -p tmp/build-artifacts
          # Chunk file list with sizes
          ls -lS frontend/discourse/dist/assets/chunk.*.js | awk '{print $5, $NF}' > tmp/build-artifacts/chunk-sizes.txt
          # Copy all chunks (without source maps)
          cp frontend/discourse/dist/assets/chunk.*.js tmp/build-artifacts/
          # Test HTML
          cp frontend/discourse/dist/tests/index.html tmp/build-artifacts/test-index.html
          # Plugin manifests
          for m in app/assets/generated/*/manifest.json; do
            plugin=$(basename $(dirname "$m"))
            cp "$m" "tmp/build-artifacts/manifest-${plugin}.json"
          done
          # assets.json
          cp frontend/discourse/dist/assets.json tmp/build-artifacts/
          # Cache hit info
          echo "cache-hit=${{ steps.app-cache.outputs.cache-hit }}" > tmp/build-artifacts/cache-info.txt

      - name: Plugins QUnit
        run: bin/rake 'plugin:qunit[*]'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: build-artifacts
          path: tmp/build-artifacts/

      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: ember-exam-execution-plugins-Chrome-frontend-${{ hashFiles('./frontend/discourse/test-execution-*.json') }}
          path: ./frontend/discourse/test-execution-*.json
