name: Migration Tests

on:
  pull_request:
    paths:
      - ".github/workflows/migration-tests.yml"
      - "migrations/**"
  push:
    branches:
      - main
      - stable
    paths:
      - ".github/workflows/migration-tests.yml"
      - "migrations/**"

concurrency:
  group: migration-tests-${{ format('{0}-{1}', github.head_ref || github.run_number, github.job) }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  gems:
    if: github.event_name == 'pull_request' || github.repository != 'discourse/discourse-private-mirror'
    name: Gem (${{ matrix.gem }})
    runs-on: ubuntu-latest
    timeout-minutes: 10

    strategy:
      fail-fast: false
      matrix:
        gem: [core, tooling, converters, importer]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true
          working-directory: migrations/${{ matrix.gem }}

      - name: RSpec (isolated, no Rails)
        working-directory: migrations/${{ matrix.gem }}
        run: bundle exec rspec --tag ~rails

  tests:
    if: github.event_name == 'pull_request' || github.repository != 'discourse/discourse-private-mirror'
    name: Tests
    runs-on: ${{ (github.repository_owner == 'discourse' && 'cdck-linux-8-core') || 'ubuntu-latest' }}
    container: discourse/discourse_test:release
    timeout-minutes: 20

    env:
      RAILS_ENV: test
      PGUSER: discourse
      PGPASSWORD: discourse
      LOAD_PLUGINS: 1

    steps:
      - name: Set working directory owner
        run: chown root:root .

      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Git
        run: |
          git config --global user.email "ci@ci.invalid"
          git config --global user.name "Discourse CI"

      - name: Start redis
        run: |
          redis-server /etc/redis/redis.conf &

      - name: Start Postgres
        run: |
          chown -R postgres /var/run/postgresql
          sudo -E -u postgres script/start_test_db.rb
          sudo -u postgres psql -c "CREATE ROLE $PGUSER LOGIN SUPERUSER PASSWORD '$PGPASSWORD';"

      - name: Symlink vendor/bundle from image
        run: |
          ln -s /var/www/discourse/vendor/bundle vendor/bundle

      - name: Setup gems
        run: |
          bundle config --local path vendor/bundle
          bundle config --local deployment true
          bundle config --local without development
          bundle config --local with migrations
          bundle install --jobs $(($(nproc) - 1))

      - name: pnpm install
        run: pnpm install --frozen-lockfile

      - name: Create and migrate database
        run: |
          bin/rake db:create
          script/silence_successful_output bin/rake db:migrate

      - name: Validate IntermediateDB schema
        run: |
          # Show structured differences between DSL config and database
          migrations/core/bin/disco schema diff --db=intermediate_db || true

          # Regenerate schema from DSL config
          migrations/core/bin/disco schema generate --db=intermediate_db

          # Check if generated output matches what's committed
          if [ ! -z "$(git status --porcelain migrations/core/db/intermediate_db_schema/ migrations/core/lib/migrations/database/intermediate_db/)" ]; then
            echo ""
            echo "=========================================="
            echo "IntermediateDB schema is not up to date."
            echo "=========================================="
            echo ""
            echo "The generated schema files differ from what is committed."
            echo "This usually means the schema DSL config or the database"
            echo "structure changed without regenerating."
            echo ""
            echo "To fix:"
            echo "  1. Run: migrations/core/bin/disco schema diff"
            echo "     to see what changed between config and database"
            echo "  2. Update config files in migrations/tooling/config/schema/intermediate_db/"
            echo "     - New tables: migrations/core/bin/disco schema add <table>"
            echo "     - Ignore tables: migrations/core/bin/disco schema ignore <table> --reason '...'"
            echo "     - New columns: add to the table's include list or ignore with reason"
            echo "  3. Run: migrations/core/bin/disco schema generate"
            echo "  4. Commit the updated config and generated files"
            echo ""
            echo "Generated file diff:"
            git -c color.ui=always diff -- migrations/core/db/intermediate_db_schema/ migrations/core/lib/migrations/database/intermediate_db/
            exit 1
          fi

      - name: RSpec (Rails integration)
        env:
          MIGRATIONS_RAILS: "1"
        run: |
          for gem in core tooling converters importer; do
            echo "== migrations-$gem (Rails integration) =="
            (cd "migrations/$gem" && BUNDLE_GEMFILE="$GITHUB_WORKSPACE/Gemfile" bundle exec rspec --tag rails)
          done
