# PR Security Scan
#
# Runs on every non-draft pull request. Fetches the PR diff and sends it to
# the patch-triage VM for security analysis. Results are posted back as a
# GitHub Check Run — staff can click "Details" to see the full scan in
# patch-triage (login required).
#
# Also notifies the VM when a PR is closed (merged or not) so patch-triage
# can auto-resolve the associated finding.

name: PR Security Scan

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, closed]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to re-scan"
        required: true
        type: string

permissions:
  statuses: write
  pull-requests: read

jobs:
  pr-closed:
    if: ${{ github.event_name == 'pull_request' && github.event.action == 'closed' }}
    runs-on: ubuntu-latest

    steps:
      - name: Notify patch-triage of PR close
        env:
          GITHUB_SCAN_SECRET: ${{ secrets.SCAN_SECRET }}
          VM_SCAN_URL: ${{ secrets.VM_SCAN_URL }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          MERGED: ${{ github.event.pull_request.merged }}
        shell: ruby {0}
        run: |
          require "json"
          require "openssl"
          require "net/http"

          vm_url = ENV["VM_SCAN_URL"].to_s
          secret = ENV["GITHUB_SCAN_SECRET"].to_s

          if vm_url.empty? || secret.empty?
            puts "Security scan not configured — skipping"
            exit 0
          end

          payload = JSON.generate(
            pr_number: ENV["PR_NUMBER"],
            repo:      ENV["REPO"],
            merged:    ENV["MERGED"] == "true",
          )

          sig = "sha256=" + OpenSSL::HMAC.hexdigest("SHA256", secret, payload)

          uri = URI("#{vm_url}/pr-closed")
          req = Net::HTTP::Post.new(uri)
          req["Content-Type"]      = "application/json"
          req["X-Scan-Signature"]  = sig
          req.body = payload

          res = Net::HTTP.start(uri.host, uri.port) { |h| h.request(req) }
          abort "VM returned #{res.code}: #{res.body}" unless res.is_a?(Net::HTTPSuccess)

  security-scan:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.action != 'closed' && !github.event.pull_request.draft) }}
    runs-on: ubuntu-latest

    steps:
      - name: Resolve PR metadata
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_PR_NUMBER: ${{ github.event.inputs.pr_number }}
          EVENT_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            PR_NUMBER="$INPUT_PR_NUMBER"
          else
            PR_NUMBER="$EVENT_PR_NUMBER"
          fi
          echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT

          PR_JSON=$(gh pr view "$PR_NUMBER" --repo "${{ github.repository }}" --json title,author,headRefOid,baseRefName)

          # Use random delimiters to prevent newline injection via PR title/author
          D=$(openssl rand -hex 8)
          { echo "title<<$D"; echo "$PR_JSON" | jq -r '.title'; echo "$D"; } >> $GITHUB_OUTPUT
          { echo "author<<$D"; echo "$PR_JSON" | jq -r '.author.login'; echo "$D"; } >> $GITHUB_OUTPUT
          echo "sha=$(echo "$PR_JSON" | jq -r '.headRefOid')" >> $GITHUB_OUTPUT
          echo "base_branch=$(echo "$PR_JSON" | jq -r '.baseRefName')" >> $GITHUB_OUTPUT

      - name: Fetch PR diff
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr diff ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} > pr.diff

          echo "Diff size: $(wc -c < pr.diff) bytes"

      - name: Send to security scan
        env:
          GITHUB_SCAN_SECRET: ${{ secrets.SCAN_SECRET }}
          VM_SCAN_URL: ${{ secrets.VM_SCAN_URL }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_TITLE: ${{ steps.pr.outputs.title }}
          PR_AUTHOR: ${{ steps.pr.outputs.author }}
          PR_SHA: ${{ steps.pr.outputs.sha }}
          BASE_BRANCH: ${{ steps.pr.outputs.base_branch }}
          REPO: ${{ github.repository }}
        shell: ruby {0}
        run: |
          require "json"
          require "openssl"
          require "net/http"

          vm_url = ENV["VM_SCAN_URL"].to_s
          secret = ENV["GITHUB_SCAN_SECRET"].to_s

          if vm_url.empty? || secret.empty?
            puts "Security scan not configured — skipping"
            exit 0
          end

          payload = JSON.generate(
            pr_number:   ENV["PR_NUMBER"],
            title:       ENV["PR_TITLE"],
            diff:        File.read("pr.diff"),
            author:      ENV["PR_AUTHOR"],
            repo:        ENV["REPO"],
            sha:         ENV["PR_SHA"],
            base_branch: ENV["BASE_BRANCH"],
          )

          sig = "sha256=" + OpenSSL::HMAC.hexdigest("SHA256", secret, payload)

          uri = URI("#{vm_url}/scan-pr")
          req = Net::HTTP::Post.new(uri)
          req["Content-Type"]     = "application/json"
          req["X-Scan-Signature"] = sig
          req.body = payload

          res = Net::HTTP.start(uri.host, uri.port) { |h| h.request(req) }
          abort "VM returned #{res.code}: #{res.body}" unless res.is_a?(Net::HTTPSuccess)
