# Mutation-testing config for the importer gem. See tooling/.mutant.yml for the
# rationale; only pure, non-`:rails` subjects are listed here.
#
# Most of the importer (copy steps, uploads, executor, the name finders that
# pull in SiteSetting/UserNameSuggester) is either DB/fork/IO-bound or
# `:rails`-tagged, so it isn't a useful mutant target. The subjects below are the
# pure ones with isolated specs: SuffixFinder (name-suffix algorithm) and
# PlaceholderResolver (in-memory token substitution, fed a mocked `maps` object).
integration:
  name: rspec
requires:
  - migrations-importer
matcher:
  subjects:
    - "Migrations::Importer::SuffixFinder"
    - "Migrations::Importer::PlaceholderResolver"
