# The IntermediateDB the converter produced; its `upload_sources` are read from here.
intermediate_db: "/path/to/your/intermediate.db"

# Directories the source files live under.
root_paths:
  - "/path/to/your/files"
  - "/path/to/more/files"

# The files database the run writes its upload results to (the same file
# `importer.yml` calls `files_db`). Defaults to `files.db` next to the
# intermediate_db above.
#files_db: "/path/to/your/files.db"

# Where files fetched from URLs are cached. Defaults to a `downloads` directory
# next to the intermediate_db above.
#download_cache_path: "/path/to/downloaded/files"

# Sometimes a file can be found at one of several locations. List path
# transformations to try; the first that resolves to an existing file wins.
#path_replacements:
#  - ["/foo/", "/bar/"]
#  - ["/foo/", "/bar/baz/"]

# Delete uploads from files.db that are not found in the IntermediateDB.
delete_surplus_uploads: false

# Delete uploads from files.db that do not have a Discourse upload record.
delete_missing_uploads: false

# A staging import runs against sites whose stored settings can't be trusted, so
# the upload store is configured explicitly here.
site_settings:
  # Set to true when importing into a site that has secure uploads enabled.
  secure_uploads: false
  # Set to true when the S3 bucket uses object ACLs and tags for access control.
  s3_enable_access_control_tags: true

  enable_s3_uploads: true
  s3_upload_bucket: "your-bucket-name"
  s3_region: "your-region"
  s3_access_key_id: "your-access-key-id"
  s3_secret_access_key: "your-secret-access-key"
  s3_cdn_url: "https://your-cdn-url.com"

  # Set this to true if the site is a multisite and configure `multisite_db_name` accordingly.
  multisite: false
  multisite_db_name: "default"
