en:
  progressbar:
    counting: "counting…"
    eta: "ETA"
    failed: "failed"
    interrupted: "interrupted"
    interrupted_at: "interrupted at %{percent}%"
    processed: "processed"
    skips:
      one: "%{number} skip"
      other: "%{number} skips"
    warnings:
      one: "%{number} warning"
      other: "%{number} warnings"
    errors:
      one: "%{number} error"
      other: "%{number} errors"
    finishing_up: "Finishing up…"
    total: "Total"
    steps:
      one: "%{number} step"
      other: "%{number} steps"
    steps_failed: "%{number} failed"
    steps_skipped: "%{number} skipped"

  cli:
    aborted: "Aborted"

  converter:
    default_step_title: "Converting %{type}"
    max_progress_calculation: "Calculating items took %{duration}"
    foreign_internal_links:
      one: "%{number} internal-looking link points at a host that isn't configured as one of the site's own: %{hosts} — add it to source_site (base_url or former_domains) so it gets rewritten."
      other: "%{number} internal-looking links point at hosts that aren't configured as the site's own: %{hosts} — add them to source_site (base_url or former_domains) so they get rewritten."
    errors:
      header: "The conversion finished with errors:"
      step_failed: "%{title} failed: %{error_class}: %{error_message}"
      step_skipped: "%{title} was skipped because a dependency failed."
      merge_failed: "Merging a step's shard into the run database failed: %{error_class}: %{error_message}"
