# Mutation-testing config for the core gem. See tooling/.mutant.yml for the
# rationale; only non-`:rails` subjects with isolated specs are listed here.
#
# Almost the whole gem turns out to be reachable: the step-orchestration layer
# (its specs stub the forking), the pure helpers (topological sort, class filter,
# placeholder/set-store models), the SQLite-backed Database layer (Extralite is
# embedded, so specs open real temp DBs with no external service), the reporters,
# and even the CLI framework and ForkManager -- none of these hit the mutation
# timeout.
#
# Left out on purpose (mutations there deadlock into the timeout):
#   * StepScheduler -- spins up real worker threads.
#   * ChunkQueue -- blocks on a pipe read.
#   * Reporting::Tui -- its spec spawns a real pty.
# Each would need its pure logic split from the thread/pipe/terminal code to
# be a useful target. Also out: StepCoordinator, Step::Processor, Step::Source
# (no isolated specs -- they drive the actual fork/process orchestration).
integration:
  name: rspec
requires:
  - migrations-core
matcher:
  subjects:
    - "Migrations::StepDependencies"
    - "Migrations::TopologicalSorter"
    - "Migrations::ClassFilter"
    - "Migrations::Placeholder"
    - "Migrations::SetStore"
    - "Migrations::SetStore::SimpleSet"
    - "Migrations::SetStore::KeyValueSet"
    - "Migrations::SetStore::TwoKeySet"
    - "Migrations::SetStore::ThreeKeySet"
    - "Migrations::ForkManager"
    - "Migrations::Database"
    - "Migrations::Database::Connection"
    - "Migrations::Database::Migrator"
    - "Migrations::Database::IntermediateDB"
    - "Migrations::Database::PreparedStatementCache"
    - "Migrations::Reporting::Factory"
    - "Migrations::Reporting::Plain"
    - "Migrations::CLI::Command"
    - "Migrations::CLI::Bootstrap"
    - "Migrations::Conversion::Base"
    - "Migrations::Conversion::Step"
    - "Migrations::Conversion::StepRunner"
    - "Migrations::Conversion::StepTracker"
    - "Migrations::Conversion::Consolidator"
    - "Migrations::Conversion::ShardManager"
    - "Migrations::Conversion::SetupGuard"
    - "Migrations::Conversion::WorkerBudget"
    - "Migrations::Conversion::Partitioner"
