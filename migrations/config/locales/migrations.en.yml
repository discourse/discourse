en:
  progressbar:
    skips:
      one: "%{count} skip"
      other: "%{count} skips"
    warnings:
      one: "%{count} warning"
      other: "%{count} warnings"
    errors:
      one: "%{count} error"
      other: "%{count} errors"
    estimated: "ETA: %{duration}"
    elapsed: "Time: %{duration}"
    processed:
      progress: "Processed: %{current}"
      progress_with_max: "Processed: %{current} / %{max}"

  converter:
    default_step_title: "Converting %{type}"
    max_progress_calculation: "Calculating items took %{duration}"

  importer:
    default_step_title: "Importing %{type}"
    loading_required_data: "Loading required data..."
    done: "Done. Total runtime: %{runtime}"
    site_setting_log_message: "Updated by import script"
    fallback_names:
      user: "user"
      group: "group"
      category: "Category"
      badge: "Badge"

  schema:
    unknown_database: "Unknown database '%{name}'. Available: %{available}"

    validate:
      warning: "⚠ %{message}"
      error: "✗ %{message}"
      valid: "✓ Schema valid"
      summary:
        one: "%{count} error"
        other: "%{count} errors"
      warning_summary:
        one: "%{count} warning"
        other: "%{count} warnings"

    generate:
      tables:
        one: "%{count} table"
        other: "%{count} tables"
      enums:
        one: "%{count} enum"
        other: "%{count} enums"
      success: "✓ Generated %{tables}, %{enums}"

    resolve:
      title: "Resolved Schema"
      separator: "==============="
      tables_header: "Tables (%{count}):"
      enums_header: "Enums (%{count}):"

    list:
      configured_tables: "Configured tables (%{count}):"
      enums: "Enums (%{count}):"
      ignored_tables: "Ignored tables: %{count}"

    show:
      table_not_found: "Table '%{name}' not found in configuration."
      available_tables: "Available tables:"
      table_name: "Table: %{name}"
      source: "Source: %{name}"
      plugin: "Plugin: %{name}"
      primary_key: "Primary Key: %{columns}"
      included_columns: "Included Columns (%{count}):"
      all_columns: "Columns: all (no explicit include list)"
      added_columns: "Added Columns (%{count}):"
      ignored_columns: "Ignored Columns (%{count}):"
      indexes: "Indexes (%{count}):"
      constraints: "Constraints (%{count}):"
      auto_ignore_plugins: "Auto-ignore plugin columns: %{value}"

    ignore:
      success: "✓ Added %{table} to ignored.rb"

    scaffold:
      success: "✓ Created %{path}"
      next_steps: "Next steps:"
      step_edit: "1. Edit the file to configure columns"
      step_validate: "2. Run 'bin/cli schema validate'"

    detect_plugins:
      detecting: "Detecting plugin tables and columns..."
      updated: "✓ Plugin manifest updated"
      updated_incomplete: "Plugin manifest updated with warnings (failed plugins: %{failed_plugins})"
      tables: "Tables: %{count}"
      columns: "Columns: %{count}"
      plugins: "Plugins: %{names}"
      up_to_date: "Plugin manifest is up to date"
      use_force: "Use --force to regenerate"
      auto_detecting: "Plugin manifest outdated, regenerating... "
      auto_done: "Detected %{tables} plugin tables, %{columns} plugin columns."
      auto_incomplete: "Detected plugin changes, but some plugin migrations failed: %{failed_plugins}"
      auto_failed: "Skipped — %{error} (use 'schema detect-plugins --force' to retry)"

    diff:
      unknown_tables: "Unknown tables (add to tables/ or ignored.rb):"
      missing_tables: "Missing tables (configured but not in database):"
      stale_ignored: "Stale ignored tables (no longer in database):"
      column_diffs: "Column differences:"
      stale_ignored_column: "%{name} (ignored but gone)"
      auto_ignored_column: "  %{name} [%{plugin}] (auto-ignored from plugin)"
      suggested_actions: "Suggested actions:"
      action_scaffold: "bin/cli schema scaffold <table>    Create config for a new table"
      action_ignore: "bin/cli schema ignore <table> [--reason \"...\"]  Add table to ignored.rb"
      no_differences: "✓ No differences found"
