intermediate_db:
  path: "/shared/import/intermediate.db"

# All `source_db` keys are passed through to libpq (`PG::Connection`), so any
# libpq connection parameter is valid here. For a database on the same machine
# the simplest setup is the Unix socket with peer authentication — set `host`
# to the socket directory and drop `port`, `user` and `password`:
#
#   source_db:
#     host: "/var/run/postgresql"
#     dbname: "discourse_source_db"
source_db:
  host: "127.0.0.1"
  port: 5432
  user: "username"
  password: "password"
  dbname: "discourse_source_db"

categories:
  map_seeded_categories: true

# The source site's own address, used to recognize absolute internal links
# (`https://forum.example.com/t/slug/123`) so they can be rewritten at import.
# Optional: without it, only relative links (`/t/slug/123`) are rewritten. List
# `former_domains` when the site moved and old posts still link to the old host;
# only the host matters (scheme and port are ignored).
#
#   source_site:
#     base_url: "https://forum.example.com"
#     former_domains:
#       - "https://old.example.com"
